<!doctype html>
<html lang="{{ .Site.Language.Lang | default "en" }}" data-page="{{ if .IsHome }}home{{ else }}{{ .Type }}{{ end }}">
<head>
  {{- partial "head.html" . }}
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="screen">
    {{- partial "header.html" . }}

    <main class="content">
      {{- block "main" . }}{{- end }}
    </main>

    {{- partial "footer.html" . }}
  </div>

  <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>
</html>
